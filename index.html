<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Plant Hub | Doctor & Smart Care</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Papa-Parse/5.3.0/papaparse.min.js"></script>

    <style>
        :root { 
            --primary: #2d5a27; 
            --accent: #4CAF50; 
            --bg: #f4f7f2; 
            --text: #333;
            --card-bg: #ffffff;
            --apple-black: #1d1d1f;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
        }

        .tabs { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; max-width: 550px; }
        .tab-btn { 
            flex: 1; padding: 12px; border: none; border-radius: 12px; 
            cursor: pointer; background: #e0eadd; color: var(--primary); 
            font-weight: bold; transition: 0.3s; font-size: 0.9rem;
        }
        .tab-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(45, 90, 39, 0.2); }

        #main-container { 
            background: var(--card-bg); 
            padding: 2.5rem; 
            border-radius: 24px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.05); 
            width: 100%; 
            max-width: 550px; 
            box-sizing: border-box; 
        }
        
        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { color: var(--primary); font-size: 1.6rem; margin: 0; letter-spacing: -0.5px; }
        .header p { color: #888; font-size: 0.85rem; margin-top: 5px; }

        .question { font-size: 1.2rem; font-weight: 600; margin-bottom: 1.5rem; text-align: center; line-height: 1.4; color: #444; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        button.option-btn { 
            padding: 16px; border: 1px solid #eee; border-radius: 12px; 
            background: white; color: var(--text); font-size: 1rem; 
            cursor: pointer; transition: 0.2s ease; text-align: left; 
        }
        button.option-btn:hover { background-color: #f9fbf9; border-color: var(--primary); color: var(--primary); }
        
        .diagnosis-card { background: #f0f7f0; padding: 20px; border-radius: 15px; border-left: 5px solid var(--primary); margin-bottom: 20px; }
        .care-tip { background: #fff8ee; padding: 15px; border-radius: 12px; font-size: 0.9rem; border: 1px dashed #edc08a; line-height: 1.5; color: #555; }
        .reset-btn { width: 100%; margin-top: 20px; background: #f0f0f0; color: #666; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 600; }

        #search-input { 
            width: 100%; padding: 15px; border-radius: 12px; 
            border: 1px solid #ddd; font-size: 1rem; margin-bottom: 15px; 
            box-sizing: border-box; outline: none; transition: border 0.2s;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="tabs">
    <button id="tab-doctor-btn" class="tab-btn active" onclick="switchTab('doctor')">🌿 Plant Doctor</button>
    <button id="tab-library-btn" class="tab-btn" onclick="switchTab('library')">🔍 Care Library</button>
</div>

<div id="main-container">
    <div id="doctor-section">
        <div class="header">
            <h1>The Plant Doctor</h1>
            <p>Diagnose symptoms and rescue your plants</p>
        </div>
        <div id="quiz-content">
            <div id="question-text" class="question">Initializing...</div>
            <div id="options-container" class="options"></div>
        </div>
        <div id="doctor-result" class="hidden">
            <div class="diagnosis-card">
                <h3 style="margin-top:0; color: var(--primary);">Diagnosis:</h3>
                <p id="diagnosis-text"></p>
            </div>
            <div class="care-tip">
                <strong>Recovery Plan:</strong> <span id="doctor-tip-text"></span>
            </div>
            <button class="reset-btn" onclick="resetDoctor()">Start New Diagnosis</button>
        </div>
    </div>

    <div id="library-section" class="hidden">
        <div class="header">
            <h1>Care Library</h1>
            <p>Search for care guides</p>
        </div>
        <input type="text" id="search-input" placeholder="Search (e.g. Aloe, Snake Plant)..." oninput="handleSearch()">
        
        <div id="search-result" class="hidden">
            <div class="diagnosis-card" style="background: white; border: 1px solid #eee; border-left: 5px solid var(--accent);">
                <h2 id="lib-name" style="margin-top:0; color: var(--primary); font-size: 1.4rem;"></h2>
                <p><strong>☀️ Sunlight:</strong> <span id="lib-sun"></span></p>
                <p><strong>💧 Watering:</strong> <span id="lib-water"></span></p>
                <p><strong>🌱 Soil:</strong> <span id="lib-soil"></span></p>
            </div>
        </div>
        <p id="not-found" class="hidden" style="text-align:center; color:#999; font-size: 0.9rem;">
            Plant not found in database.
        </p>
    </div>
</div>

<script>
    let plantDatabase = [];

    // 2. ENSURE LIBRARY IS ACCESSIBLE BEFORE RUNNING
    window.onload = function() {
        if (typeof Papa === 'undefined') {
            console.error("PapaParse library failed to load.");
            document.getElementById('question-text').innerText = "Error: Library not loaded.";
            return;
        }

        Papa.parse("plants.csv", {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                plantDatabase = results.data;
                console.log("Database Loaded:", plantDatabase.length, "plants.");
                renderDoctorNode('start'); 
            },
            error: function(err) {
                console.error("Error loading CSV:", err);
                document.getElementById('question-text').innerText = "Check local server connection.";
            }
        });
    };

    const doctorTree = {
        start: { text: "What is the primary symptom?", options: [ { label: "Leaves are turning yellow/brown", next: "color" }, { label: "The plant is drooping or wilting", next: "wilting" }, { label: "I see pests or sticky spots", next: "pests" } ] },
        color: { text: "Where is the color change most visible?", options: [ { label: "Bottom leaves are yellowing", next: "res_nitrogen" }, { label: "Tips are brown and crispy", next: "res_humidity" } ] },
        wilting: { text: "How does the soil feel 2 inches deep?", options: [ { label: "Dry and dusty", next: "res_underwater" }, { label: "Soggy or very wet", next: "res_overwater" } ] },
        pests: { text: "What do you see on the leaves?", options: [ { label: "White cottony fluff", next: "res_mealy" }, { label: "Fine webs", next: "res_mites" } ] },
        res_underwater: { isResult: true, text: "Chronic Dehydration", tip: "Give it a thorough 'bottom watering' soak for 30 minutes." },
        res_overwater: { isResult: true, text: "Potential Root Rot", tip: "Stop watering immediately. Check for mushy roots and repot in dry soil." },
        res_humidity: { isResult: true, text: "Low Humidity", tip: "Mist your plant daily or group it with others." },
        res_nitrogen: { isResult: true, text: "Nutrient Deficiency", tip: "Try using a balanced fertilizer." },
        res_mealy: { isResult: true, text: "Mealybugs", tip: "Wipe with a cotton swab dipped in rubbing alcohol." },
        res_mites: { isResult: true, text: "Spider Mites", tip: "Wipe leaves with soapy water." }
    };

    function renderDoctorNode(nodeKey) {
        const node = doctorTree[nodeKey];
        const quizContent = document.getElementById('quiz-content');
        const resultDiv = document.getElementById('doctor-result');
        if (node.isResult) {
            quizContent.classList.add('hidden');
            resultDiv.classList.remove('hidden');
            document.getElementById('diagnosis-text').innerText = node.text;
            document.getElementById('doctor-tip-text').innerText = node.tip;
        } else {
            quizContent.classList.remove('hidden');
            resultDiv.classList.add('hidden');
            document.getElementById('question-text').innerText = node.text;
            const optionsEl = document.getElementById('options-container');
            optionsEl.innerHTML = '';
            node.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt.label;
                btn.onclick = () => renderDoctorNode(opt.next);
                optionsEl.appendChild(btn);
            });
        }
    }

    function resetDoctor() { renderDoctorNode('start'); }

    function handleSearch() {
        const query = document.getElementById('search-input').value.toLowerCase().trim();
        const resultBox = document.getElementById('search-result');
        const notFound = document.getElementById('not-found');

        if (query.length < 2) {
            resultBox.classList.add('hidden');
            notFound.classList.add('hidden');
            return;
        }

        const match = plantDatabase.find(p => 
            p["Plant Name"] && p["Plant Name"].toLowerCase().includes(query)
        );

        if (match) {
            document.getElementById('lib-name').innerText = match["Plant Name"];
            document.getElementById('lib-sun').innerText = match["Sunlight"];
            document.getElementById('lib-water').innerText = match["Watering"];
            document.getElementById('lib-soil').innerText = match["Soil"]; 
            resultBox.classList.remove('hidden');
            notFound.classList.add('hidden');
        } else {
            resultBox.classList.add('hidden');
            notFound.classList.remove('hidden');
        }
    }

    function switchTab(tab) {
        document.getElementById('doctor-section').classList.toggle('hidden', tab !== 'doctor');
        document.getElementById('library-section').classList.toggle('hidden', tab !== 'library');
        document.getElementById('tab-doctor-btn').classList.toggle('active', tab === 'doctor');
        document.getElementById('tab-library-btn').classList.toggle('active', tab === 'library');
    }
</script>

</body>
</html>
