<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Plant Hub | Doctor & Care Library</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Papa-Parse/5.3.0/papaparse.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <style>
        :root { --primary: #2d5a27; --accent: #4CAF50; --bg: #f4f7f2; --text: #333; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; max-width: 550px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; cursor: pointer; background: #e0eadd; color: var(--primary); font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; }

        #main-container { background: white; padding: 2.5rem; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.08); width: 100%; max-width: 550px; box-sizing: border-box; }
        
        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { color: var(--primary); font-size: 1.8rem; margin: 0; }
        .header p { color: #666; font-size: 0.9rem; margin-top: 5px; }

        .question { font-size: 1.25rem; font-weight: 600; margin-bottom: 1.5rem; text-align: center; line-height: 1.4; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        button.option-btn { padding: 15px; border: 1.5px solid #eee; border-radius: 12px; background: white; color: var(--text); font-size: 1rem; font-weight: 500; cursor: pointer; transition: 0.2s ease; text-align: left; }
        button.option-btn:hover { background-color: var(--primary); color: white; border-color: var(--primary); }
        
        .diagnosis-card { background: #e8f5e9; padding: 20px; border-radius: 12px; border-left: 6px solid var(--primary); margin-bottom: 20px; }
        .care-tip { background: #fff3e0; padding: 15px; border-radius: 10px; font-size: 0.9rem; border: 1px dashed #ffb74d; line-height: 1.5; }
        .reset-btn { width: 100%; margin-top: 20px; background: #666; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; }

        #search-input { width: 100%; padding: 15px; border-radius: 12px; border: 1.5px solid #eee; font-size: 1rem; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        #search-input:focus { border-color: var(--primary); }
        .hidden { display: none; }
        .info-label { font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<div class="tabs">
    <button id="tab-doc-btn" class="tab-btn active" onclick="switchTab('doctor')">🌿 Plant Doctor</button>
    <button id="tab-lib-btn" class="tab-btn" onclick="switchTab('library')">🔍 Care Library</button>
</div>

<div id="main-container">
    <div id="doctor-section">
        <div class="header">
            <h1>The Plant Doctor</h1>
            <p>Diagnose symptoms and save your plant</p>
        </div>
        <div id="quiz-content">
            <div id="question-text" class="question">Loading Database...</div>
            <div id="options-container" class="options"></div>
        </div>
        <div id="doctor-result" class="hidden">
            <div class="diagnosis-card">
                <h3 style="margin-top:0; color: #1b3d17;">Diagnosis:</h3>
                <p id="diagnosis-text"></p>
            </div>
            <div class="care-tip">
                <strong>Recovery Plan:</strong> <span id="doctor-tip-text"></span>
            </div>
            <button class="reset-btn" onclick="resetDoctor()">Start New Diagnosis</button>
        </div>
    </div>

    <div id="library-section" class="hidden">
        <div class="header">
            <h1>Care Library</h1>
            <p>Search guides for 100+ plants</p>
        </div>
        <input type="text" id="search-input" placeholder="Try 'Aloe', 'Basil', or 'Orchid'..." oninput="handleSearch()">
        
        <div id="search-result" class="hidden">
            <div class="diagnosis-card" style="background: white; border-color: var(--accent);">
                <h2 id="lib-name" style="margin-top:0; color: var(--primary); margin-bottom: 15px;"></h2>
                <p><span class="info-label">☀️ Sunlight:</span> <span id="lib-sun"></span></p>
                <p><span class="info-label">💧 Watering:</span> <span id="lib-water"></span></p>
                <p><span class="info-label">🌱 Soil:</span> <span id="lib-soil"></span></p>
                <p><span class="info-label">📈 Growth:</span> <span id="lib-growth"></span></p>
                <p><span class="info-label">🧪 Fertilizer:</span> <span id="lib-fert"></span></p>
            </div>
        </div>
        <p id="not-found" class="hidden" style="text-align:center; color:#999; margin-top: 20px;">We don't have that plant yet. Try another!</p>
    </div>
</div>

<script>
    let plantDatabase = []; 

    window.onload = function() {
        if (typeof Papa === 'undefined') {
            document.getElementById('question-text').innerText = "Library failed to load. Check your internet.";
            return;
        }

        // Make sure plants.csv is in the same folder as this HTML file
        Papa.parse("plants.csv", {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                plantDatabase = results.data;
                console.log("Database Loaded:", plantDatabase.length, "plants.");
                renderDoctorNode('start');
            },
            error: function() {
                document.getElementById('question-text').innerText = "Error loading plants.csv. Ensure it is uploaded to GitHub.";
            }
        });
    };

    const doctorTree = {
        start: { text: "What is the primary symptom?", options: [{ label: "Leaves changing color", next: "color" }, { label: "Drooping or Wilting", next: "wilting" }, { label: "Pests or strange spots", next: "pests" }] },
        color: { text: "Where is the color changing?", options: [{ label: "Bottom leaves turning yellow", next: "res_nitrogen" }, { label: "Tips are brown and crispy", next: "res_humidity" }] },
        wilting: { text: "How does the soil feel 2 inches deep?", options: [{ label: "Dry and dusty", next: "res_underwater" }, { label: "Wet or soggy", next: "res_overwater" }] },
        pests: { text: "What do you see on the leaves?", options: [{ label: "White cottony fluff", next: "res_mealy" }, { label: "Fine webs", next: "res_mites" }] },
        res_underwater: { isResult: true, text: "Chronic Dehydration", tip: "Give it a deep 'bottom watering' soak for 20 minutes." },
        res_overwater: { isResult: true, text: "Potential Root Rot", tip: "Stop watering immediately. Repot in fresh, dry soil if roots look mushy." },
        res_humidity: { isResult: true, text: "Low Humidity", tip: "The air is too dry. Mist the leaves daily or use a pebble tray." },
        res_nitrogen: { isResult: true, text: "Nutrient Deficiency", tip: "The plant needs food. Use a balanced fertilizer during the next watering." },
        res_mealy: { isResult: true, text: "Mealybug Infestation", tip: "Dab pests with a cotton swab dipped in rubbing alcohol." },
        res_mites: { isResult: true, text: "Spider Mites", tip: "Wipe leaves with soapy water and increase humidity." }
    };

    function renderDoctorNode(nodeKey) {
        const node = doctorTree[nodeKey];
        const quizContent = document.getElementById('quiz-content');
        const resultDiv = document.getElementById('doctor-result');
        if (node.isResult) {
            quizContent.classList.add('hidden');
            resultDiv.classList.remove('hidden');
            document.getElementById('diagnosis-text').innerText = node.text;
            document.getElementById('doctor-tip-text').innerText = node.tip;
        } else {
            quizContent.classList.remove('hidden');
            resultDiv.classList.add('hidden');
            document.getElementById('question-text').innerText = node.text;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            node.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt.label;
                btn.onclick = () => renderDoctorNode(opt.next);
                container.appendChild(btn);
            });
        }
    }

    function handleSearch() {
        const query = document.getElementById('search-input').value.toLowerCase().trim();
        const resBox = document.getElementById('search-result');
        const notFound = document.getElementById('not-found');

        if (query.length < 2) {
            resBox.classList.add('hidden');
            notFound.classList.add('hidden');
            return;
        }

        const match = plantDatabase.find(p => {
            const name = p["Plant Name"];
            return name && name.toLowerCase().includes(query);
        });

        if (match) {
            document.getElementById('lib-name').innerText = match["Plant Name"];
            document.getElementById('lib-sun').innerText = match["Sunlight"];
            document.getElementById('lib-water').innerText = match["Watering"];
            document.getElementById('lib-soil').innerText = match["Soil"];
            document.getElementById('lib-growth').innerText = match["Growth"];
            document.getElementById('lib-fert').innerText = match["Fertilization Type"];
            resBox.classList.remove('hidden');
            notFound.classList.add('hidden');
        } else {
            resBox.classList.add('hidden');
            notFound.classList.remove('hidden');
        }
    }

    function switchTab(tab) {
        document.getElementById('doctor-section').classList.toggle('hidden', tab !== 'doctor');
        document.getElementById('library-section').classList.toggle('hidden', tab !== 'library');
        document.getElementById('tab-doc-btn').classList.toggle('active', tab === 'doctor');
        document.getElementById('tab-lib-btn').classList.toggle('active', tab === 'library');
    }

    function resetDoctor() { renderDoctorNode('start'); }
</script>
</body>
</html>
